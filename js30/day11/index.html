<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>HTML Video Player</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="loading-wrapper">
        <div class="loading-modal">Loading</div>
    </div>
    <div class="player">
      <video
        class="player__video viewer"
        src="652333414.mp4"
      ></video>

      <div class="player__controls">

        <div class="progress">
          <div class="progress__filled"></div>
          <input
            type="range"
            name="playbackRate"
            class="player__slider progress-slider"
            min="1"
            max="100"
            step="1"
            value="1"
            autocomplete="off"
          />
        </div>
        <div class="main-controls">
          <button class="play-button" title="Toggle Play">
            <span class="pb pb-before"></span>
            <span class="pb pb-after"></span>
          </button>
          <button data-skip="-10" class="player__button before">-10s</button>
          <button data-skip="25" class="player__button skip">+10s</button>
          <input
            type="range"
            name="volume"
            class="player__slider volume"
            min="0"
            max="1"
            step="0.05"
            value="1"
            autocomplete="off"
          />
        </div>

      </div>
    </div>

    <script src="index.js"></script>
  </body>
</html>
