<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Photo Goose</title>
  </head>

  <body>
    <h2>Photo <span class="hl">Goose</span></h2>

    <main>
      <div class="controls">
        <label for="blur">Blur:</label>
        <input
          id="blur"
          type="range"
          name="blur"
          min="0"
          max="25"
          value="0"
          data-sizing="px"
          autocomplete="off"
        />

        <label for="sepia">Sepia</label>
        <input
          id="sepia"
          type="range"
          name="sepia"
          min="0"
          max="100"
          value="0"
          autocomplete="off"
        />

        <label for="saturation">Saturation</label>
        <input
          id="saturation"
          type="range"
          name="saturation"
          min="0"
          max="40"
          value="20"
          autocomplete="off"
        />

        <label for="contrast">Contranst</label>
        <input
          id="contrast"
          type="range"
          name="contrast"
          min="0"
          max="40"
          value="20"
          autocomplete="off"
        />

        <label for="brightness">Brightness</label>
        <input
          id="brightness"
          type="range"
          name="brightness"
          min="1"
          max="40"
          value="20"
          autocomplete="off"
        />

        <label for="brightness">Brightness</label>
        <input
          id="brightness"
          type="range"
          name="brightness"
          min="1"
          max="40"
          value="20"
          autocomplete="off"
        />

        <label for="spacing">Border Width:</label>
        <input
          id="spacing"
          type="range"
          name="spacing"
          min="5"
          max="40"
          value="10"
          data-sizing="px"
          autocomplete="off"
        />

        <label for="base">Border Color</label>
        <input
          id="base"
          type="color"
          name="base"
          value="#ffffff"
          autocomplete="off"
        />
      </div>

      <div class="img-container">
        <div class="img-wrapper">
          <img
            src="https://images.unsplash.com/photo-1527856263669-12c3a0af2aa6?ixlib=rb-1.2.1&ixid=MnwxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8&auto=format&fit=crop&w=2070&q=80"
          />
        </div>
      </div>
    </main>
  </body>

  <script>
    function addRangeHandler(inputId, handler) {
      const input = document.getElementById(inputId);

      input.addEventListener("change", handler);
      input.addEventListener("mousemove", handler);
    }

    document.getElementById("base").addEventListener("input", function () {
      document.documentElement.style.setProperty(`--base`, this.value);
    });

    function sepiaHandler() {
      let val = `${this.value / 100}`;
      document.documentElement.style.setProperty(`--${this.name}`, `${val}`);
    }

    addRangeHandler("sepia", sepiaHandler);

    function saturationHandler() {
      let val = `${this.value / 20}`;
      console.log(val);
      document.documentElement.style.setProperty(`--${this.name}`, `${val}`);
    }

    addRangeHandler("saturation", saturationHandler);

    function contrastHandler() {
      let val = `${this.value / 20}`;
      console.log(val);
      document.documentElement.style.setProperty(`--${this.name}`, `${val}`);
    }

    addRangeHandler("contrast", contrastHandler);

    function brightnessHandler() {
      let val = `${this.value / 20}`;
      console.log(val);
      document.documentElement.style.setProperty(`--${this.name}`, `${val}`);
    }

    addRangeHandler("brightness", brightnessHandler);

    function handleUpdate() {
      const suffix = this.dataset.sizing || "";
      document.documentElement.style.setProperty(
        `--${this.name}`,
        `${this.value}${suffix}`
      );
    }

    addRangeHandler("blur", handleUpdate);
    addRangeHandler("spacing", handleUpdate);
    addRangeHandler("base", handleUpdate);
  </script>
</html>
